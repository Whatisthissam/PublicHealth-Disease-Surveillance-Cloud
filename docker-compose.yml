version: '3.8'

services:
  # ============================================================
  # MySQL Database
  # ============================================================
  db:
    image: mysql:8.0
    container_name: ph_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: publichealth_cloud
      MYSQL_USER: phapp
      MYSQL_PASSWORD: ${DB_PASSWORD:-phapp_password123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - ph_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # Backend API
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ph_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: publichealth_cloud
      DB_USER: phapp
      DB_PASSWORD: ${DB_PASSWORD:-phapp_password123}
      JWT_SECRET: ${JWT_SECRET:-change_this_super_secret_key_in_production_min32chars}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:80
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ph_network
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # Frontend (Nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: ph_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - ph_network
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  ph_network:
    driver: bridge
    name: publichealth_network

volumes:
  mysql_data:
    name: publichealth_mysql_data
